<template id="ambient-bg-template">
  <div data-composition-id="ambient-bg" data-start="0" data-width="1080" data-height="1920" data-duration="__DUR__">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;600;700&display=block" />
    <div class="act act1" id="act1">
      <div class="base b1"></div>
      <div class="grid g1" id="g1"></div>
      <div class="blob r1" id="r1"></div>
      <div class="blob a1" id="a1"></div>
    </div>
    <div class="act act2" id="act2">
      <div class="base b2"></div>
      <div class="grid g2" id="g2"></div>
      <div class="blob o2" id="o2"></div>
      <div class="blob c2" id="c2"></div>
    </div>
    <div class="dots" id="dots"></div>
    <div class="hud-bar"><div class="hud-fill" id="hud-fill"></div></div>
    <div class="hud-label">BITSNESS&nbsp;&#183;&nbsp;ARKON&nbsp;<span class="dot" id="huddot">&#9679;</span></div>
    <style>
      [data-composition-id="ambient-bg"] { position: absolute; inset: 0; overflow: hidden; background: #E7E2D6; }
      [data-composition-id="ambient-bg"] .act { position: absolute; inset: 0; }
      [data-composition-id="ambient-bg"] .base { position: absolute; inset: 0; }
      [data-composition-id="ambient-bg"] .b1 { background: radial-gradient(ellipse 92% 60% at 50% 32%, #EFEADE 0%, #E7E2D6 50%, #DBD4C4 100%); }
      [data-composition-id="ambient-bg"] .b2 { background: radial-gradient(ellipse 92% 60% at 50% 30%, #FCF7EC 0%, #F7F1E6 52%, #F0E7D6 100%); }
      [data-composition-id="ambient-bg"] .grid { position: absolute; inset: -10%; }
      [data-composition-id="ambient-bg"] .g1 { background-image:
          repeating-linear-gradient(0deg, rgba(80,70,55,0.05) 0 1px, transparent 1px 92px),
          repeating-linear-gradient(90deg, rgba(80,70,55,0.05) 0 1px, transparent 1px 92px);
        mask-image: radial-gradient(ellipse 80% 75% at 50% 45%, #000 35%, transparent 86%); -webkit-mask-image: radial-gradient(ellipse 80% 75% at 50% 45%, #000 35%, transparent 86%); }
      [data-composition-id="ambient-bg"] .g2 { background-image:
          repeating-linear-gradient(0deg, rgba(194,65,12,0.05) 0 1px, transparent 1px 104px),
          repeating-linear-gradient(90deg, rgba(194,65,12,0.05) 0 1px, transparent 1px 104px);
        mask-image: radial-gradient(ellipse 80% 75% at 50% 45%, #000 40%, transparent 88%); -webkit-mask-image: radial-gradient(ellipse 80% 75% at 50% 45%, #000 40%, transparent 88%); }
      [data-composition-id="ambient-bg"] .blob { position: absolute; border-radius: 50%; filter: blur(54px); }
      [data-composition-id="ambient-bg"] .r1 { width: 620px; height: 620px; left: -120px; top: 1140px; background: radial-gradient(circle, rgba(208,73,47,0.12) 0%, transparent 70%); }
      [data-composition-id="ambient-bg"] .a1 { width: 560px; height: 560px; left: 640px; top: 160px; background: radial-gradient(circle, rgba(201,154,58,0.13) 0%, transparent 70%); }
      [data-composition-id="ambient-bg"] .o2 { width: 660px; height: 660px; left: -120px; top: 1120px; background: radial-gradient(circle, rgba(226,114,44,0.14) 0%, transparent 70%); }
      [data-composition-id="ambient-bg"] .c2 { width: 560px; height: 560px; left: 640px; top: 150px; background: radial-gradient(circle, rgba(47,168,184,0.10) 0%, transparent 70%); }
      [data-composition-id="ambient-bg"] .dots { position: absolute; inset: 0; }
      [data-composition-id="ambient-bg"] .dt { position: absolute; border-radius: 50%; background: rgba(80,70,55,0.12); }
      [data-composition-id="ambient-bg"] .hud-bar { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: rgba(80,70,55,0.08); }
      [data-composition-id="ambient-bg"] .hud-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%;
        background: linear-gradient(90deg, #D0492F, #C99A3A 38%, #E2722C 72%, #2FA8B8); }
      [data-composition-id="ambient-bg"] .hud-label { position: absolute; top: 28px; left: 44px;
        font-family: "Roboto Mono", monospace; font-weight: 600; font-size: 22px; letter-spacing: 0.14em; color: #8a7f6a; }
      [data-composition-id="ambient-bg"] .hud-label .dot { color: #D0492F; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const root = '[data-composition-id="ambient-bg"]';
        const DUR = __DUR__, SWITCH = __SWITCH__; // SWITCH: set past DUR for single-act pieces
        function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
        const rand = mulberry32(20260708);
        const dc = document.querySelector(root + " #dots");
        const dots = [];
        for (let i = 0; i < 20; i++) {
          const d = document.createElement("div"); d.className = "dt";
          const sz = 4 + rand() * 6; d.style.width = sz + "px"; d.style.height = sz + "px";
          d.style.left = (rand() * 1080) + "px"; d.style.top = (rand() * 1920) + "px";
          d.style.opacity = (0.3 + rand() * 0.5).toFixed(2);
          dc.appendChild(d); dots.push({ el: d, amp: 16 + rand() * 28, dur: 2.8 + rand() * 2.6, ph: rand() });
        }
        const tl = gsap.timeline({ paused: true });
        tl.set(root + " #act2", { autoAlpha: 0 }, 0);
        tl.to(root + " #hud-fill", { width: "100%", duration: DUR, ease: "none" }, 0);
        tl.to(root + " #g1", { backgroundPositionY: "92px", backgroundPositionX: "46px", duration: 6, ease: "none", repeat: Math.ceil(SWITCH / 6) }, 0);
        tl.to(root + " #g2", { backgroundPositionY: "104px", backgroundPositionX: "52px", duration: 8, ease: "none", repeat: Math.ceil(DUR / 8) }, 0);
        tl.to(root + " #r1", { x: 200, y: -120, duration: 10, ease: "sine.inOut", repeat: Math.ceil(SWITCH/10), yoyo: true }, 0);
        tl.to(root + " #a1", { x: -160, y: 120, duration: 12, ease: "sine.inOut", repeat: Math.ceil(SWITCH/12), yoyo: true }, 0);
        tl.to(root + " #o2", { x: 200, y: -120, scale: 1.12, duration: 11, ease: "sine.inOut", repeat: Math.ceil(DUR/11), yoyo: true }, 0);
        tl.to(root + " #c2", { x: -180, y: 140, scale: 1.14, duration: 13, ease: "sine.inOut", repeat: Math.ceil(DUR/13), yoyo: true }, 0);
        // ACT SWITCH at Arkon reveal: dusty -> cream
        tl.to(root + " #act1", { autoAlpha: 0, duration: 1.6, ease: "sine.inOut" }, SWITCH);
        tl.to(root + " #act2", { autoAlpha: 1, duration: 1.6, ease: "sine.inOut" }, SWITCH);
        tl.to(root + " #huddot", { color: "#E2722C", duration: 0.8 }, SWITCH + 0.6);
        tl.to(root + " .dt", { backgroundColor: "rgba(226,114,44,0.16)", duration: 1.2 }, SWITCH);
        dots.forEach((p) => {
          const cyc = p.dur * 2;
          tl.to(p.el, { y: "-=" + p.amp, duration: p.dur, ease: "sine.inOut", repeat: Math.ceil(DUR / cyc), yoyo: true }, p.ph * 2.2);
        });
        tl.set({}, {}, DUR);
        window.__timelines = window.__timelines || {};
        window.__timelines["ambient-bg"] = tl;
      })();
    </script>
  </div>
</template>
