<template id="captions-template">
  <div data-composition-id="captions" data-start="0" data-width="1080" data-height="1920" data-duration="__DURATION__">
    <div class="cap-stage" id="cap-stage"></div>
    <style>
      [data-composition-id="captions"] { position: absolute; inset: 0; pointer-events: none; }
      [data-composition-id="captions"] .cap-stage { position: absolute; left: 0; right: 0; bottom: 380px; height: 0; pointer-events: none; }
      [data-composition-id="captions"] .cap-line-wrap { position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; padding: 0 70px; opacity: 0; visibility: hidden; }
      [data-composition-id="captions"] .cap-line {
        display: inline-block; max-width: 940px; text-align: center;
        font-family: "Montserrat", sans-serif; font-weight: 900;
        font-size: 54px; line-height: 1.16; letter-spacing: -0.01em; color: #102033;
        text-shadow:
          -3px -3px 0 #FFFFFF, 3px -3px 0 #FFFFFF, -3px 3px 0 #FFFFFF, 3px 3px 0 #FFFFFF,
          -4px 0 0 #FFFFFF, 4px 0 0 #FFFFFF, 0 -4px 0 #FFFFFF, 0 4px 0 #FFFFFF,
          0 6px 16px rgba(16,32,51,0.20);
        white-space: normal; overflow-wrap: anywhere; word-break: break-word;
      }
      [data-composition-id="captions"] .cap-word { display: inline-block; transform-origin: center bottom; will-change: transform, color; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const SEGMENTS = __SEGMENTS__;
        const COMP_DURATION = __DURATION__;
        const DIM = "rgba(16,32,51,0.34)"; const SPOKEN = "#102033"; const ACTIVE_SCALE = 1.13;
        const stage = document.querySelector('[data-composition-id="captions"] #cap-stage');
        if (!stage) return;
        SEGMENTS.forEach(function (seg, segIdx) {
          const wrap = document.createElement("div"); wrap.className = "cap-line-wrap"; wrap.id = "cap-seg-" + segIdx;
          const line = document.createElement("div"); line.className = "cap-line";
          seg.words.forEach(function (w, wIdx) {
            const span = document.createElement("span"); span.className = "cap-word"; span.id = "cap-w-" + segIdx + "-" + wIdx;
            span.textContent = w.w; line.appendChild(span);
            if (wIdx < seg.words.length - 1) line.appendChild(document.createTextNode(" "));
          });
          wrap.appendChild(line); stage.appendChild(wrap);
        });
        const tl = gsap.timeline({ paused: true });
        const FADE_IN = 0.14, FADE_OUT = 0.12, PRE_ROLL = 0.05, POST_HOLD = 0.05;
        SEGMENTS.forEach(function (seg, segIdx) {
          const wrapSel = '[data-composition-id="captions"] #cap-seg-' + segIdx;
          const segStart = seg.words[0].start; const segEnd = seg.words[seg.words.length - 1].end;
          const next = SEGMENTS[segIdx + 1]; const nextStart = next ? next.words[0].start : segEnd + 0.6;
          const fadeInAt = Math.max(segStart - PRE_ROLL, 0);
          let fadeOutAt = Math.max(segEnd + POST_HOLD, nextStart - 0.16);
          fadeOutAt = Math.min(fadeOutAt, nextStart - 0.02 - FADE_OUT);
          if (fadeOutAt < fadeInAt + 0.1) fadeOutAt = fadeInAt + 0.1;
          const hideAt = Math.min(fadeOutAt + FADE_OUT + 0.02, nextStart - 0.01);
          seg.words.forEach(function (w, wIdx) {
            tl.set('[data-composition-id="captions"] #cap-w-' + segIdx + "-" + wIdx, { color: DIM, scale: 1.0 }, fadeInAt);
          });
          tl.set(wrapSel, { visibility: "visible" }, fadeInAt);
          tl.fromTo(wrapSel, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: FADE_IN, ease: "power2.out" }, fadeInAt);
          seg.words.forEach(function (w, wIdx) {
            const wordSel = '[data-composition-id="captions"] #cap-w-' + segIdx + "-" + wIdx;
            tl.to(wordSel, { color: seg.active, scale: ACTIVE_SCALE, duration: 0.09, ease: "back.out(3)" }, w.start);
            tl.to(wordSel, { color: SPOKEN, scale: 1.0, duration: 0.13, ease: "power2.out" }, Math.max(w.end, w.start + 0.12));
          });
          tl.to(wrapSel, { opacity: 0, duration: FADE_OUT, ease: "power2.in" }, fadeOutAt);
          tl.set(wrapSel, { visibility: "hidden" }, hideAt);
        });
        tl.set({}, {}, COMP_DURATION);
        window.__timelines = window.__timelines || {};
        window.__timelines["captions"] = tl;
      })();
    </script>
  </div>
</template>
