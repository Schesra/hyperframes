<template id="sNN-slug-template">
  <div data-composition-id="sNN-slug" data-start="0" data-duration="__MOUNT_DUR__" data-width="1080" data-height="1920">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700;800;900&family=Roboto+Mono:wght@500;600;700&display=block" />
    <!-- .sbg = this scene's OWN opaque act background. REQUIRED: it's what makes
         push/wipe/slide transitions move the whole frame (transition-map.md §0). -->
    <div class="sbg"></div>
    <div class="scene">
      <!-- micro-world metaphor elements per the approved storyboard row -->
      <div class="punch" id="punch">PUNCH LINE <b>KEYWORD</b></div>
    </div>
    <style>
      [data-composition-id="sNN-slug"] { position:absolute; inset:0; overflow:hidden; font-family:"Be Vietnam Pro",sans-serif; color:#3A3327; }
      /* ---- ACT 1 (dusty) background — for act-2 scenes use the CREAM block below instead ---- */
      [data-composition-id="sNN-slug"] .sbg { position:absolute; inset:0; z-index:0; background:radial-gradient(ellipse 92% 60% at 50% 32%, #EFEADE 0%, #E7E2D6 50%, #DBD4C4 100%); }
      [data-composition-id="sNN-slug"] .sbg::before { content:""; position:absolute; inset:-10%; background-image:repeating-linear-gradient(0deg, rgba(80,70,55,0.05) 0 1px, transparent 1px 92px), repeating-linear-gradient(90deg, rgba(80,70,55,0.05) 0 1px, transparent 1px 92px); -webkit-mask-image:radial-gradient(ellipse 80% 75% at 50% 45%, #000 38%, transparent 88%); mask-image:radial-gradient(ellipse 80% 75% at 50% 45%, #000 38%, transparent 88%); }
      [data-composition-id="sNN-slug"] .sbg::after { content:""; position:absolute; width:660px; height:660px; left:-120px; top:1120px; border-radius:50%; filter:blur(54px); background:radial-gradient(circle, rgba(208,73,47,0.10) 0%, transparent 70%); }
      /* ---- ACT 2 (cream) variant — swap the three .sbg rules above for these on act-2 scenes:
      .sbg          background:radial-gradient(ellipse 92% 60% at 50% 30%, #FCF7EC 0%, #F7F1E6 52%, #F0E7D6 100%);
      .sbg::before  grid color rgba(194,65,12,0.05), 104px pitch;
      .sbg::after   blob rgba(226,114,44,0.12);   (and body text color #1E2A3A)              ---- */
      /* padding keeps the top chrome (0-100px) and caption zone (bottom ~500px) clear */
      [data-composition-id="sNN-slug"] .scene { position:absolute; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:250px 56px 500px; box-sizing:border-box; gap:30px; }
      [data-composition-id="sNN-slug"] .card { background:#F4EFE3; border:2px solid #C9B98E; border-radius:16px; box-shadow:0 12px 28px rgba(90,70,40,0.16); }
      [data-composition-id="sNN-slug"] .card.hot { background:#fff; border-color:#D0492F; }
      [data-composition-id="sNN-slug"] .badge { font-family:"Roboto Mono",monospace; font-weight:700; font-size:20px; padding:6px 14px; border-radius:100px; color:#D0492F; background:rgba(208,73,47,0.14); }
      [data-composition-id="sNN-slug"] .punch { font-weight:900; font-size:54px; line-height:1.22; text-align:center; }
      [data-composition-id="sNN-slug"] .punch b { color:#D0492F; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const root = '[data-composition-id="sNN-slug"]';
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
        // 1. hide late elements via tl.set(...,{autoAlpha:0},0) — NEVER via CSS opacity:0.
        //    CSS-hidden + .from(autoAlpha) animates 0->0 and the element never appears
        //    (run scripts/preflight_scenes.py to catch this before lint).
        tl.set(root + " .punch", { autoAlpha: 0 }, 0);
        // 2. element timings are RELATIVE: rel = narration word time − beat start
        //    implement the storyboard's named motion recipes here (hyperframes-animation rules)
        // 3. reveals use fromTo with an EXPLICIT end state (seek-safe, no captured-value traps):
        tl.set(root + " .punch", { autoAlpha: 1 }, 2.0);
        tl.fromTo(root + " .punch", { y: 18, scale: 0.95 }, { y: 0, scale: 1, duration: 0.45, ease: "back.out(1.5)" }, 2.0);
        // 4. keep something moving mid-beat (no static frame > 3s)
        tl.set({}, {}, __MOUNT_DUR__); // pin timeline length to the mount duration
        window.__timelines = window.__timelines || {};
        window.__timelines["sNN-slug"] = tl;
      })();
    </script>
  </div>
</template>
